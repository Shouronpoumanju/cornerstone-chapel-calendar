<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELIHU 出欠・カレンダー</title>
<style>
:root{
  --sun:#e5484d; --sat:#3a6ff2; --ink:#1b2330; --muted:#6b7688;
  --line:rgba(24,39,70,.10);
  --accent:#4666f6; --accent2:#7a5cff;
  --glass:rgba(255,255,255,.72); --glass-strong:rgba(255,255,255,.9);
  --shadow:0 10px 34px rgba(30,50,100,.10);
}
*{box-sizing:border-box}
body{font-family:-apple-system,"Hiragino Sans","Noto Sans JP","Yu Gothic",system-ui,sans-serif;margin:0;color:var(--ink);
  -webkit-font-smoothing:antialiased;
  background:radial-gradient(1100px 640px at 12% -12%,#e9f0ff 0%,transparent 55%),radial-gradient(1000px 600px at 112% -6%,#f4ecff 0%,transparent 52%),linear-gradient(180deg,#fbfdff,#f3f6fc);
  background-attachment:fixed;min-height:100vh}
header{position:sticky;top:0;z-index:20;display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:12px 20px;
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-bottom:1px solid var(--line)}
header h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.01em;color:var(--ink)}
header .badge{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;border-radius:999px;padding:6px 15px;font-size:14px;box-shadow:0 6px 18px rgba(70,102,246,.32)}
.tabs{display:flex;gap:8px;margin-left:auto}
.tab{background:rgba(255,255,255,.55);color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:8px 18px;font-size:14px;font-weight:600;cursor:pointer;transition:.18s;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.tab:hover{color:var(--ink);background:#fff}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(70,102,246,.30)}
.wrap{max-width:1120px;margin:0 auto;padding:22px 20px 40px}
.card{background:var(--glass);backdrop-filter:blur(18px) saturate(1.35);-webkit-backdrop-filter:blur(18px) saturate(1.35);
  border:1px solid var(--glass-strong);border-radius:20px;box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
label{font-size:13px;color:var(--muted)}
select,input[type=text],textarea{font:inherit;padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.72);color:var(--ink);outline:none;transition:.15s}
select:focus,input[type=text]:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(70,102,246,.16);background:#fff}
textarea{width:100%;min-height:120px}
button{font:inherit;cursor:pointer}
.btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;box-shadow:0 8px 18px rgba(70,102,246,.24);transition:.16s}
.btn:hover{transform:translateY(-1px);box-shadow:0 12px 24px rgba(70,102,246,.30)}
.btn:active{transform:translateY(0)}
.btn.green{background:linear-gradient(135deg,#16c088,#0ca678);box-shadow:0 8px 18px rgba(16,170,120,.26)}
.btn.gray{background:rgba(255,255,255,.66);color:var(--muted);border:1px solid var(--line);box-shadow:none}
.btn.gray:hover{color:var(--ink);background:#fff}
.btn.ghost{background:rgba(255,255,255,.66);color:var(--ink);border:1px solid var(--line);box-shadow:none}
.btn.ghost:hover{background:#fff}
.hint{font-size:12.5px;color:var(--muted);line-height:1.65}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
.cal .h{padding:8px 0;text-align:center;font-weight:600;color:var(--muted);background:transparent;font-size:13px;letter-spacing:.04em}
.cal .h.s0{color:var(--sun)}.cal .h.s6{color:var(--sat)}
.cell{background:rgba(255,255,255,.68);border:1px solid var(--line);min-height:66px;padding:6px 7px;font-size:13px;position:relative;cursor:pointer;border-radius:14px;transition:.14s}
.cell:hover{background:#fff;box-shadow:0 8px 18px rgba(30,50,100,.09)}
.cell.empty{background:transparent;border-color:transparent;cursor:default;box-shadow:none}
.cell .d{font-weight:600;color:var(--ink)}
.cell.s0 .d{color:var(--sun)}.cell.s6 .d{color:var(--sat)}
.cell.pick{border-color:var(--accent);box-shadow:0 0 0 3px rgba(70,102,246,.18)}
.cell.ng{background:rgba(229,72,77,.10);border-color:rgba(229,72,77,.28)}
.abs{font-size:11px;color:var(--sun);line-height:1.3;margin-top:2px;word-break:break-all}
.bigx{font-size:30px;line-height:1;color:var(--sun);font-weight:800;text-align:center;margin-top:2px}
#memberCal .cell{min-height:78px}
#memberCal .cell.ng{background:rgba(229,72,77,.13);border-color:rgba(229,72,77,.38)}
.avail{position:absolute;right:8px;bottom:6px;font-size:11px;color:#0ca678;font-weight:700}
.ev{font-size:11px;border-radius:8px;padding:2px 8px;margin-top:3px;color:#fff;display:inline-block;font-weight:600}
.selbar{margin-top:14px;padding:14px 16px;background:rgba(255,255,255,.82);border:1px solid var(--glass-strong);border-radius:16px;box-shadow:var(--shadow)}
.chip{display:inline-block;background:rgba(70,102,246,.08);border:1px solid rgba(70,102,246,.18);border-radius:999px;padding:5px 13px;margin:3px;font-size:12.5px;color:var(--ink)}
.chip b{margin-right:4px}
.chip .x{color:var(--sun);cursor:pointer;margin-left:6px;font-weight:700}
.out{width:100%;min-height:70px;font-size:14px;background:rgba(255,255,255,.72);border:1px solid var(--line);border-radius:12px}
.eventbtns button{margin:3px 4px 3px 0}
.mini{font-size:11px}
details summary{outline:none}
/* ===== 配布用カレンダー(プレビュー) ===== */
#print-area{background:#fff;padding:12px 10px;border-radius:14px}
.pv-top{display:grid;grid-template-columns:1fr 2fr 1fr;align-items:center;margin-bottom:10px}
.pv-title{text-align:center}
.pv-title .yr{font-size:14px;color:var(--muted);font-weight:600;letter-spacing:.18em}
.pv-title .mo{font-size:42px;font-weight:800;line-height:1.02;letter-spacing:-.01em;color:var(--ink)}
.pv-badge{display:inline-block;background:transparent;color:var(--accent);font-weight:700;font-size:16px;letter-spacing:.01em;border:1.5px solid rgba(70,102,246,.35);border-radius:999px;padding:4px 16px;margin-top:7px}
.pv-credit{text-align:right;font-size:10px;color:#b8c0cc;margin-top:6px;letter-spacing:.1em}
.pv-mini{font-size:9px;color:var(--muted)}
.pv-mini table{border-collapse:collapse;margin:0 auto}
.pv-mini td,.pv-mini th{width:15px;text-align:center;padding:0;font-weight:400}
.pv-mini .s0{color:var(--sun)}.pv-mini .s6{color:var(--sat)}
.pv-cal{display:grid;grid-template-columns:repeat(7,1fr);border-top:2px solid var(--ink);border-left:1px solid var(--line)}
.pv-h{text-align:center;color:var(--muted);font-weight:700;padding:8px 0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);font-size:16px;background:#fbfcff;letter-spacing:.05em}
.pv-h.s0{color:var(--sun)}.pv-h.s6{color:var(--sat)}
.pv-c{min-height:104px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 7px;position:relative;background:#fff}
.pv-c .n{font-weight:700;font-size:20px;color:var(--ink)}
.pv-c.s0 .n{color:var(--sun)}.pv-c.s6 .n{color:var(--sat)}
.pv-c.off{background:#fafbfe}
.pv-c.off .n{color:#c7cedb;font-weight:500}
.pv-ev{text-align:center;font-size:17px;font-weight:700;margin-top:6px;line-height:1.2}
.ok{color:#0ca678;font-weight:700;font-size:11px;margin-top:2px}
.logrow{font-size:13px;padding:6px 0;border-bottom:1px solid var(--line);line-height:1.4}
@media print{
  header,.tabs,.no-print{display:none !important}
  body{background:#fff}
  .wrap{max-width:none;padding:0}
  .card{box-shadow:none;padding:0;margin:0;background:#fff;border:none;backdrop-filter:none;-webkit-backdrop-filter:none}
  #print-area{padding:0;border-radius:0}
  @page{size:A4 landscape;margin:8mm}
}
</style>
</head>
<body>
<header>
  <span class="badge" id="hdrBadge">ELIHU</span>
  <h1>出欠 & カレンダー</h1>
  <div class="tabs no-print">
    <button class="tab active" data-m="member" onclick="setMode('member')">メンバー用</button>
    <button class="tab" id="adminTab" data-m="admin" style="display:none" onclick="setMode('admin')">管理者(のあ)</button>
  </div>
</header>

<div class="wrap">
  <!-- 共通設定 -->
  <div class="card no-print">
    <div class="row">
      <label>対象月</label>
      <select id="selYear"></select>
      <select id="selMonth"></select>
      <label style="margin-left:12px">教会名</label>
      <input type="text" id="inpChurch" value="コーナーストーンチャペル" style="width:180px">
      <label>奉仕チーム</label>
      <input type="text" id="inpTeam" value="ELIHU" style="width:90px">
      <button class="btn ghost" onclick="saveAll()">この端末に保存</button>
    </div>
  </div>

  <!-- 共有設定 -->
  <div class="card no-print">
    <b>共有設定</b>
    <span class="hint">この教会専用の保存先に自動接続。メンバーの入力は自動で のあ に届きます。</span>
    <div class="row" id="shareRow" style="margin-top:8px"></div>
    <div class="hint" id="shareStatus" style="margin-top:6px"></div>
  </div>

  <!-- ===================== メンバー用 ===================== -->
  <section id="viewMember">
    <div class="card no-print">
      <div class="row">
        <label>お名前</label>
        <input type="text" id="memName" list="memList" placeholder="例:れいあ" style="width:160px">
        <datalist id="memList"></datalist>
        <span class="hint">来られない日をタップ →「送信」を押してください（自動で のあ に届きます）。</span>
      </div>
      <div id="memberCal" class="cal"></div>
      <div class="row" style="margin-top:14px">
        <button class="btn green" style="font-size:17px;padding:11px 26px" onclick="submitMember()">送信</button>
        <span id="memStatus" class="hint"></span>
      </div>
      <details style="margin-top:12px">
        <summary class="hint" style="cursor:pointer">送信できないとき（コピーして手動で送る）</summary>
        <textarea id="memOut" class="out" readonly onclick="this.select()" style="margin-top:6px"></textarea>
        <div class="row" style="margin-top:8px">
          <button class="btn ghost" onclick="copyOut()">コピー</button>
          <span id="copyMsg" class="hint"></span>
        </div>
      </details>
    </div>
  </section>

  <!-- ===================== 管理者用 ===================== -->
  <section id="viewAdmin" style="display:none">
    <div class="no-print" style="text-align:right;margin-bottom:8px">
      <button class="btn gray" onclick="lockAdmin()">🔒 管理者ページをロック（この端末で隠す）</button>
    </div>
    <div class="card no-print">
      <b>① メンバーの回答を集める</b>
      <div class="row" style="margin-top:6px">
        <button class="btn green" onclick="pullResponses()">共有から取得（自動）</button>
        <label><input type="checkbox" id="autoPull" checked> 自動更新</label>
        <button class="btn ghost" onclick="loadDemo()">サンプル(7月)を読み込む</button>
        <button class="btn gray" onclick="clearAll()">全消去</button>
        <span id="pullStatus" class="hint"></span>
      </div>
      <div id="memberChips" style="margin-top:8px"></div>
      <details style="margin-top:10px" open>
        <summary class="hint" style="cursor:pointer"><b>入力履歴（誰が・いつ・何を入力したか）</b></summary>
        <div class="row" style="margin-top:6px">
          <button class="btn ghost" onclick="loadLog()">履歴を更新</button>
          <span id="logStatus" class="hint"></span>
        </div>
        <div id="logBox" style="margin-top:6px;max-height:200px;overflow:auto"></div>
      </details>
      <details style="margin-top:10px">
        <summary class="hint" style="cursor:pointer">手動で貼り付ける（予備）</summary>
        <textarea id="pasteArea" placeholder="#ELIHU|れいあ|2026-07|3,9,10" style="margin-top:6px"></textarea>
        <button class="btn ghost" style="margin-top:6px" onclick="parseResponses()">貼り付けを読み込む</button>
      </details>
    </div>

    <div class="card no-print">
      <b>② 日を選んで予定を配置</b>
      <div class="row" style="margin-top:6px">
        <label><input type="checkbox" id="autoWorship" checked onchange="renderAll()"> 毎週日曜に「主日礼拝」</label>
        <span class="hint">日をタップ→送られてきた都合を見ながら、バイブルスタディー/祈祷会/特別行事を配置。自分が行ける日は「○」で追加。緑=参加可能、赤=欠席。</span>
      </div>
      <div id="adminCal" class="cal"></div>
      <div id="selBar" class="selbar" style="display:none"></div>
    </div>

    <div class="card">
      <div class="row no-print" style="margin-bottom:10px">
        <b>③ 配布用カレンダー(プレビュー)</b>
        <button class="btn green" style="margin-left:auto" onclick="window.print()">印刷 / PDF保存</button>
      </div>
      <div id="print-area"></div>
    </div>
  </section>
</div>

<script>
const COL={worship:'#b07d1e',bs:'#0ea5a0',pr:'#e0663a',special:'#7a5cff'};
const DEF={worship:{label:'主日礼拝',time:'10:30'},bs:{label:'バイブルスタディー',time:'19:30'},pr:{label:'祈祷会',time:'19:30'}};
const WD=['日','月','火','水','木','金','土'];
// 共有オンライン保存(kvdb.io) — この教会専用バケット。全員が自動接続。
const ROOM='XqLAiB9aYNRVeVUzatVgmp';
const TOKEN='elihuWriteKx9Qm2';
const AUTH={'Authorization':'Bearer '+TOKEN};
let S=load()||{year:2026,month:7,church:'コーナーストーンチャペル',team:'ELIHU',room:'',members:['れいあ','たかし','ちかこ'],absent:{},events:{},selfAvail:{},selfName:'のあ'};
if(!S.team)S.team='ELIHU'; S.room=ROOM; if(!S.selfAvail)S.selfAvail={}; if(!S.selfName)S.selfName='のあ';
let mode='member', memberNG=new Set(), pickDay=null, pollTimer=null;

/* ===== 共有オンライン保存(アカウント不要) =====
   既定は kvdb.io。別サービスに変える場合はここだけ差し替え。 */
const STORE='https://kvdb.io';
function ymStr(){return S.year+'-'+String(S.month).padStart(2,'0');}
function b64url(s){return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');}
function keyFor(ym,name){return ym+'__'+b64url(name);}
async function roomCreate(){
  try{const r=await fetch(STORE,{method:'POST'});if(!r.ok)throw 0;const id=(await r.text()).trim();
    if(!id)throw 0;S.room=id;saveAll();renderShare();
    alert('共有コードを作成しました:\n\n'+id+'\n\nこのコードと、このアプリのファイル(またはURL)をメンバーに配ってください。');}
  catch(e){alert('作成に失敗しました。ネット接続を確認してください。');}
}
function roomJoin(){const v=(document.getElementById('joinCode')?.value||'').trim();
  if(!v)return alert('共有コードを入力してください');S.room=v;saveAll();renderShare();flash('shareStatus','参加しました');}
function roomLeave(){if(confirm('共有コードを解除しますか？'))
{S.room='';saveAll();renderShare();}}
function normalizeList(d){
  if(Array.isArray(d))return d.map(x=>Array.isArray(x)?{key:x[0],value:x[1]}:{key:x.key||'',value:x.value!==undefined?x.value:x});
  if(d&&typeof d==='object')return Object.entries(d).map(([k,v])=>({key:k,value:v}));
  return [];}
async function submitMember(){
  const name=(document.getElementById('memName').value||'').trim();
  if(!name)return alert('お名前を入れてください');
  if(!S.room)return alert('共有コードが未設定です。上の「共有設定」でコードを入力してください。');
  const days=[...memberNG].sort((a,b)=>a-b);const ym=ymStr();
  const ts=Date.now();const payload=JSON.stringify({name,days,ts});
  flash('memStatus','送信中…');
  try{const r=await fetch(`${STORE}/${S.room}/${keyFor(ym,name)}`,{method:'POST',headers:AUTH,body:payload});
    if(!r.ok)throw 0;
    // 履歴(誰が・いつ・何を)を追記記録。上書きされず残る
    try{await fetch(`${STORE}/${S.room}/log-${ym}-${ts}-${Math.random().toString(36).slice(2,7)}`,{method:'POST',headers:AUTH,body:payload});}catch(_){}
    flash('memStatus','✅ 送信・記録しました（'+ym+' / '+new Date(ts).toLocaleString('ja-JP')+'）');}
  catch(e){flash('memStatus','⚠ 送信できませんでした。下の「コピーして手動で送る」をご利用ください');}
}
async function loadLog(){
  if(!S.room){flash('logStatus','共有コード未設定');return;}
  const ym=ymStr();flash('logStatus','取得中…');
  try{const r=await fetch(`${STORE}/${S.room}/?format=json&values=true&prefix=log-${ym}-`,{headers:AUTH});
    if(!r.ok)throw 0;const list=normalizeList(await r.json());
    const rows=list.map(({value})=>{let o=value;if(typeof value==='string'){try{o=JSON.parse(value)}catch(_){o=null}}return o;})
      .filter(o=>o&&o.name).sort((a,b)=>(b.ts||0)-(a.ts||0));
    document.getElementById('logBox').innerHTML = rows.length
      ? rows.map(o=>`<div class="logrow"><b>${o.name}</b> <span style="color:#888">${o.ts?new Date(o.ts).toLocaleString('ja-JP'):''}</span><br>来られない日: ${(o.days||[]).join(', ')||'なし'}</div>`).join('')
      : '<span class="hint">履歴はまだありません</span>';
    flash('logStatus','✅ '+rows.length+'件');}
  catch(e){flash('logStatus','⚠ 取得できませんでした');}
}
async function pullResponses(){
  if(!S.room){flash('pullStatus','共有コード未設定（サンプルか手動貼付をご利用ください）');return;}
  const ym=ymStr();flash('pullStatus','取得中…');
  try{const r=await fetch(`${STORE}/${S.room}/?format=json&values=true&prefix=${ym}__`,{headers:AUTH});
    if(!r.ok)throw 0;const data=await r.json();const list=normalizeList(data);
    S.absent={};
    list.forEach(({value})=>{let o=value;if(typeof value==='string'){try{o=JSON.parse(value)}catch(_){o=null}}
      if(o&&o.name){S.absent[o.name]=(o.days||[]).map(Number);if(!S.members.includes(o.name))S.members.push(o.name);}});
    saveAll();renderAll();flash('pullStatus','✅ '+list.length+'人 取得（'+new Date().toLocaleTimeString('ja-JP')+'）');}
  catch(e){flash('pullStatus','⚠ 取得できませんでした。コード/ネットを確認、または手動貼付をご利用ください');}
}
function renderShare(){
  const row=document.getElementById('shareRow');if(!row)return;
  row.innerHTML='<span style="color:#2f855a;font-weight:700">✔ 共有オンライン保存に接続済み（自動）</span>'+
    ' <span class="hint">メンバーは名前を入れて「送信」するだけ。コード入力は不要です。</span>';
}

function load(){try{return JSON.parse(localStorage.getItem('elihu'))}catch(e){return null}}
function saveAll(){S.church=document.getElementById('inpChurch').value||'コーナーストーンチャペル';S.team=document.getElementById('inpTeam').value||'ELIHU';localStorage.setItem('elihu',JSON.stringify(S));flash('copyMsg','保存しました');}
function flash(id,t){const e=document.getElementById(id);if(e){e.textContent=t;setTimeout(()=>e.textContent='',2000);}}
function daysIn(y,m){return new Date(y,m,0).getDate();}
function wdOf(y,m,d){return new Date(y,m-1,d).getDay();}
function weeksOf(y,m){const n=daysIn(y,m),f=wdOf(y,m,1);let w=[],cur=new Array(f).fill(0),d=1;
  while(d<=n){cur.push(d++);if(cur.length===7){w.push(cur);cur=[];}}
  if(cur.length){while(cur.length<7)cur.push(0);w.push(cur);}return w;}

/* ===== 管理者ページの秘密URLロック ===== */
const ADMIN_HASH='c45e94c80d7d26502d85977834b96cab8355c084c6f10b64157943a6681f10d9';
async function sha256hex(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
async function initAdminGate(){
  let ok=localStorage.getItem('adminOK')==='1', viaLink=false;
  const frag=(location.hash||'').replace(/^#/,'').trim();
  if(frag){try{if(await sha256hex(frag)===ADMIN_HASH){ok=true;viaLink=true;localStorage.setItem('adminOK','1');
    history.replaceState(null,'',location.pathname+location.search);}}catch(e){}}
  window.__adminOK=ok;
  const at=document.getElementById('adminTab');if(at)at.style.display=ok?'':'none';
  if(viaLink)setMode('admin');
}
function lockAdmin(){localStorage.removeItem('adminOK');window.__adminOK=false;location.href=location.pathname;}

function setMode(m){if(m==='admin'&&!window.__adminOK)m='member';mode=m;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.m===m));
  document.getElementById('viewMember').style.display=m==='member'?'':'none';
  document.getElementById('viewAdmin').style.display=m==='admin'?'':'none';
  renderAll();
  if(m==='admin')startPoll();else stopPoll();}
function startPoll(){stopPoll();if(S.room&&document.getElementById('autoPull')?.checked){pullResponses();
  pollTimer=setInterval(()=>{if(mode==='admin'&&document.getElementById('autoPull')?.checked)pullResponses();},20000);}}
function stopPoll(){if(pollTimer){clearInterval(pollTimer);pollTimer=null;}}

// ---------- 初期化 ----------
function initSelectors(){
  const sy=document.getElementById('selYear'),sm=document.getElementById('selMonth');
  for(let y=2025;y<=2028;y++)sy.add(new Option(y+'年',y));
  for(let m=1;m<=12;m++)sm.add(new Option(m+'月',m));
  sy.value=S.year;sm.value=S.month;
  sy.onchange=sm.onchange=()=>{S.year=+sy.value;S.month=+sm.value;memberNG.clear();renderAll();};
  document.getElementById('inpChurch').value=S.church;
  document.getElementById('inpTeam').value=S.team;
  document.getElementById('inpChurch').oninput=e=>{S.church=e.target.value||'コーナーストーンチャペル';document.getElementById('hdrBadge').textContent=S.church;renderPreview();};
  document.getElementById('inpTeam').oninput=e=>{S.team=e.target.value||'ELIHU';renderPreview();};
  document.getElementById('hdrBadge').textContent=S.church;
  document.getElementById('memName').oninput=renderMemberOut;
}

// ---------- メンバー用 ----------
function renderMember(){
  const cal=document.getElementById('memberCal');cal.innerHTML='';
  WD.forEach((w,i)=>{const h=document.createElement('div');h.className='h'+(i===0?' s0':i===6?' s6':'');h.textContent=w;cal.appendChild(h);});
  weeksOf(S.year,S.month).flat().forEach(d=>{
    const c=document.createElement('div');
    if(d===0){c.className='cell empty';cal.appendChild(c);return;}
    const wd=wdOf(S.year,S.month,d);
    c.className='cell'+(wd===0?' s0':wd===6?' s6':'')+(memberNG.has(d)?' ng':'');
    c.innerHTML='<div class="d">'+d+'</div>'+(memberNG.has(d)?'<div class="bigx">×</div>':'');
    c.onclick=()=>{memberNG.has(d)?memberNG.delete(d):memberNG.add(d);renderMember();renderMemberOut();};
    cal.appendChild(c);
  });
  // datalist
  const dl=document.getElementById('memList');dl.innerHTML='';
  S.members.forEach(n=>dl.appendChild(new Option(n)));
  renderMemberOut();
}
function renderMemberOut(){
  const name=(document.getElementById('memName').value||'（名前）').trim();
  const days=[...memberNG].sort((a,b)=>a-b);
  const ym=S.year+'-'+String(S.month).padStart(2,'0');
  const human=`${name}｜${S.year}年${S.month}月 来られない日: ${days.length?days.join(', '):'なし'}`;
  const tag=`#ELIHU|${name}|${ym}|${days.join(',')}`;
  document.getElementById('memOut').value=human+'\n'+tag;
}
function copyOut(){const t=document.getElementById('memOut');t.select();
  navigator.clipboard?.writeText(t.value).then(()=>flash('copyMsg','コピーしました'),()=>{document.execCommand('copy');flash('copyMsg','コピーしました');});}

// ---------- 管理者:回答パース ----------
function parseResponses(){
  const lines=document.getElementById('pasteArea').value.split(/\n+/);
  const ym=S.year+'-'+String(S.month).padStart(2,'0');let added=0,warn=0;
  lines.forEach(ln=>{
    ln=ln.trim();if(!ln)return;
    let m=ln.match(/#ELIHU\|([^|]+)\|(\d{4}-\d{2})\|([\d,\s]*)/);
    if(m){const name=m[1].trim();if(m[2]!==ym){warn++;return;}
      const days=m[3].split(',').map(x=>parseInt(x)).filter(x=>x>=1&&x<=31);
      S.absent[name]=days;if(!S.members.includes(name))S.members.push(name);added++;return;}
    // 人間可読フォールバック: 「名前｜...来られない日: 3, 9」
    m=ln.match(/^([^｜|:：]+)[｜|].*?(?:来られない日|来れない|NG)[:：]?\s*([\d,\s、]+)/);
    if(m){const name=m[1].trim();const days=m[2].split(/[,\s、]+/).map(x=>parseInt(x)).filter(x=>x>=1&&x<=31);
      S.absent[name]=days;if(!S.members.includes(name))S.members.push(name);added++;}
  });
  saveAll();renderAll();
  flash('copyMsg','');
  document.getElementById('pasteArea').value='';
  alert(`${added}件 読み込みました`+(warn?`（対象月と違う${warn}件は除外）`:''));
}
function loadDemo(){
  S.year=2026;S.month=7;document.getElementById('selYear').value=2026;document.getElementById('selMonth').value=7;
  S.members=['れいあ','たかし','ちかこ'];
  S.absent={れいあ:[3,9,10,14,19,20,22,23,27,28,31],たかし:[3,6,9,13,17,18,22,24,25,26],ちかこ:[5,6,12,13,20,21,24,29,30]};
  S.events={};S.selfAvail={'2026-07':[1,2,8,15,16,21,28]};saveAll();renderAll();
}
function clearAll(){if(!confirm('全員の回答と配置を消去しますか？'))return;S.absent={};S.events={};S.selfAvail={};memberNG.clear();saveAll();renderAll();}
function removeMember(n){delete S.absent[n];S.members=S.members.filter(x=>x!==n);saveAll();renderAll();}

// 本人(のあ)の参加できる日(○) — 送信データが1人でもあれば人数に加算
function selfDays(){return (S.selfAvail&&S.selfAvail[ymStr()])||[];}
function toggleSelf(d){const ym=ymStr();S.selfAvail[ym]=S.selfAvail[ym]||[];
  const i=S.selfAvail[ym].indexOf(d);if(i>=0)S.selfAvail[ym].splice(i,1);else S.selfAvail[ym].push(d);
  saveAll();renderAll();}
function availOf(d){
  const names=Object.keys(S.absent);let tot=names.length,av=0;
  names.forEach(n=>{if(!S.absent[n].includes(d))av++;});
  const sd=selfDays();
  if(sd.length){tot+=1;if(sd.includes(d))av++;}          // のあ本人を加算
  if(!tot)tot=S.members.length;                           // データ無しの初期表示
  return{avail:av,tot};}
function absentNames(d){return Object.keys(S.absent).filter(n=>S.absent[n].includes(d));}
function selfHere(d){return selfDays().includes(d);}

// ---------- イベント操作 ----------
function addEvent(day,type,label,time){
  S.events[day]=S.events[day]||[];
  if(S.events[day].some(e=>e.type===type&&type!=='special'))return;
  const base=DEF[type]||{label:label||'行事',time:time||''};
  S.events[day].push({type,label:label||base.label,time:time!==undefined?time:base.time,color:COL[type]});
}
function removeEvent(day,idx){S.events[day].splice(idx,1);if(!S.events[day].length)delete S.events[day];}

// ---------- 管理者カレンダー ----------
function renderAdmin(){
  const cal=document.getElementById('adminCal');cal.innerHTML='';
  WD.forEach((w,i)=>{const h=document.createElement('div');h.className='h'+(i===0?' s0':i===6?' s6':'');h.textContent=w;cal.appendChild(h);});
  weeksOf(S.year,S.month).flat().forEach(d=>{
    const c=document.createElement('div');
    if(d===0){c.className='cell empty';cal.appendChild(c);return;}
    const wd=wdOf(S.year,S.month,d),a=availOf(d),abs=absentNames(d);
    const ratio=a.tot?a.avail/a.tot:1;
    c.className='cell'+(wd===0?' s0':wd===6?' s6':'')+(pickDay===d?' pick':'');
    if(a.tot){if(ratio<=0.5)c.style.background='#ffe9e9';else if(a.avail===a.tot)c.style.background='#e8f8ee';}
    let ev='';(evList(d)).forEach(e=>{ev+=`<span class="ev" style="background:${e.color}">${e.label}</span>`;});
    const self=selfHere(d)?`<div class="ok">○${S.selfName}</div>`:'';
    c.innerHTML=`<div class="d">${d}</div>${abs.length?`<div class="abs">✕ ${abs.join(' ')}</div>`:''}${self}${ev}${a.tot?`<div class="avail">可${a.avail}</div>`:''}`;
    c.onclick=()=>{pickDay=d;renderAdmin();renderSelBar();};
    cal.appendChild(c);
  });
  renderChips();
}
function evList(d){ // 自動主日礼拝を含めた表示用リスト
  let list=(S.events[d]||[]).slice();
  if(document.getElementById('autoWorship')?.checked && wdOf(S.year,S.month,d)===0 && !list.some(e=>e.type==='worship'))
    list.unshift({type:'worship',label:DEF.worship.label,time:DEF.worship.time,color:COL.worship});
  return list;
}
function renderChips(){
  const box=document.getElementById('memberChips');box.innerHTML='';
  const names=Object.keys(S.absent);
  if(!names.length){box.innerHTML='<span class="hint">まだ回答がありません。</span>';return;}
  names.forEach(n=>{const s=document.createElement('span');s.className='chip';
    s.innerHTML=`<b>${n}</b>不可${S.absent[n].length}日<span class="x" onclick="removeMember('${n}')">✕</span>`;box.appendChild(s);});
}
function renderSelBar(){
  const bar=document.getElementById('selBar');
  if(!pickDay){bar.style.display='none';return;}
  bar.style.display='';
  const d=pickDay,a=availOf(d),abs=absentNames(d);
  let cur='';(S.events[d]||[]).forEach((e,i)=>{cur+=`<span class="ev" style="background:${e.color}">${e.label} <span style="cursor:pointer" onclick="removeEvent(${d},${i});renderAll()">✕</span></span> `;});
  const on=selfHere(d);
  bar.innerHTML=`<b>${S.month}月${d}日(${WD[wdOf(S.year,S.month,d)]})</b> 　参加可 <b style="color:#2f855a">${a.avail}人</b> ${abs.length?`／欠席: <span style="color:#c00">${abs.join('、')}</span>`:'／全員可'}
    <div class="eventbtns" style="margin-top:8px">
      <button class="btn ghost" onclick="addEvent(${d},'worship');renderAll()">主日礼拝</button>
      <button class="btn ghost" onclick="addEvent(${d},'bs');renderAll()">バイブルスタディー</button>
      <button class="btn ghost" onclick="addEvent(${d},'pr');renderAll()">祈祷会</button>
      <button class="btn ghost" onclick="addSpecial(${d})">特別行事…</button>
      <button class="${on?'btn green':'btn ghost'}" onclick="toggleSelf(${d})">${on?'○ 自分は参加できる(解除)':'○ 自分は参加できる'}</button>
      <button class="btn gray" onclick="delete S.events[${d}];renderAll()">行事を空に</button>
    </div>
    <div style="margin-top:6px">現在: ${cur||'（なし）'}</div>`;
}
function addSpecial(d){const label=prompt('行事名（例:クリスマス礼拝, 特別集会 など）');if(!label)return;addEvent(d,'special',label,'');renderAll();}

// ---------- ELIHU プレビュー ----------
function miniTable(y,m){
  let h=`<div style="text-align:center;font-weight:700">${m}月</div><table><tr>`;
  WD.forEach((w,i)=>h+=`<th class="${i===0?'s0':i===6?'s6':''}">${w}</th>`);h+='</tr>';
  weeksOf(y,m).forEach(wk=>{h+='<tr>';wk.forEach((d,i)=>h+=`<td class="${i===0?'s0':i===6?'s6':''}">${d||''}</td>`);h+='</tr>';});
  return h+'</table>';
}
function renderPreview(){
  const pa=document.getElementById('print-area');
  const y=S.year,m=S.month;
  const pm=m===1?[y-1,12]:[y,m-1], nm=m===12?[y+1,1]:[y,m+1];
  let html=`<div class="pv-top">
      <div class="pv-mini">${miniTable(pm[0],pm[1])}</div>
      <div class="pv-title"><div class="yr">${y}</div><div class="mo">${m}月</div><div class="pv-badge">${S.church}</div></div>
      <div class="pv-mini">${miniTable(nm[0],nm[1])}</div>
    </div><div class="pv-cal">`;
  WD.forEach((w,i)=>html+=`<div class="pv-h ${i===0?'s0':i===6?'s6':''}">${w}</div>`);
  const weeks=weeksOf(y,m), prevDays=daysIn(pm[0],pm[1]), f=wdOf(y,m,1), lastwd=wdOf(y,m,daysIn(y,m));
  weeks.forEach((wk,wi)=>{
    wk.forEach((d,i)=>{
      if(d===0){
        let off='';
        if(wi===0&&i<f)off=prevDays-(f-1)+i;
        else if(wi===weeks.length-1&&i>lastwd)off=i-lastwd;
        html+=`<div class="pv-c off ${i===0?'s0':i===6?'s6':''}"><div class="n">${off||''}</div></div>`;return;
      }
      let ev='';evList(d).forEach(e=>{ev+=`<div class="pv-ev" style="color:${e.color}">${e.label}</div>`;});
      html+=`<div class="pv-c ${i===0?'s0':i===6?'s6':''}"><div class="n">${d}</div>${ev}</div>`;
    });
  });
  pa.innerHTML=html+'</div><div class="pv-credit">'+S.team+' 奉仕チーム</div>';
}

function renderAll(){
  document.getElementById('selYear').value=S.year;document.getElementById('selMonth').value=S.month;
  if(mode==='member')renderMember();
  renderAdmin();renderSelBar();renderPreview();renderShare();
  localStorage.setItem('elihu',JSON.stringify(S));
}
initSelectors();renderAll();initAdminGate();
</script>
